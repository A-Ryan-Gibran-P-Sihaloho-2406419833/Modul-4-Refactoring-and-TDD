<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order History</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>
<body>
<div class="container mt-5">
    <h2>Order History</h2>
    <p>Daftar pesanan yang pernah Anda buat.</p>

    <table class="table table-striped table-bordered mt-3">
        <thead class="thead-dark">
        <tr>
            <th>Order ID</th>
            <th>Author</th>
            <th>Waktu Pemesanan (Timestamp)</th>
            <th>Status Pesanan</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}">Order ID</td>
            <td th:text="${order.author}">Author Name</td>
            <td th:text="${order.orderTime}">Timestamp</td>
            <td>
                <span th:if="${order.status == 'SUCCESS'}" class="badge badge-success" th:text="${order.status}">SUCCESS</span>
                <span th:if="${order.status == 'WAITING_PAYMENT'}" class="badge badge-warning" th:text="${order.status}">WAITING_PAYMENT</span>
                <span th:if="${order.status == 'FAILED' || order.status == 'REJECTED' || order.status == 'CANCELLED'}" class="badge badge-danger" th:text="${order.status}">FAILED</span>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(orders)}">
            <td colspan="4" class="text-center">Belum ada pesanan.</td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/}" class="btn btn-secondary mt-3">Kembali ke Home</a>
</div>
</body>
</html>
