<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment History</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>
<body>
<div class="container mt-5">
    <h2>Payment History</h2>
    <p>Daftar seluruh transaksi pembayaran.</p>

    <table class="table table-striped table-bordered mt-3">
        <thead class="thead-dark">
        <tr>
            <th>Payment ID</th>
            <th>Order ID</th>
            <th>Method</th>
            <th>Status</th>
            <th>Aksi</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="payment : ${payments}">
            <td th:text="${payment.id}">Payment ID</td>
            <td th:text="${payment.order.id}">Order ID</td>
            <td th:text="${payment.method}">Method</td>
            <td>
                <span th:if="${payment.status == 'SUCCESS'}" class="badge badge-success" th:text="${payment.status}">SUCCESS</span>
                <span th:if="${payment.status == 'WAITING_PAYMENT'}" class="badge badge-warning" th:text="${payment.status}">WAITING_PAYMENT</span>
                <span th:if="${payment.status == 'REJECTED'}" class="badge badge-danger" th:text="${payment.status}">REJECTED</span>
            </td>
            <td>
                <form th:action="@{/payment/{id}/success(id=${payment.id})}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-sm btn-success" th:disabled="${payment.status == 'SUCCESS' || payment.status == 'REJECTED'}">Terima</button>
                </form>
                <form th:action="@{/payment/{id}/reject(id=${payment.id})}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-sm btn-danger" th:disabled="${payment.status == 'SUCCESS' || payment.status == 'REJECTED'}">Tolak</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(payments)}">
            <td colspan="5" class="text-center">Belum ada transaksi pembayaran.</td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/}" class="btn btn-secondary mt-3">Kembali ke Home</a>
</div>
</body>
</html>
